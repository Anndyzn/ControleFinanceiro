<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <h1>Controle Financeiro</h1>
    <section class="filtro-mes">
        <div>
            <label for="anoFiltro">Ano</label>
            <select id="anoFiltro"></select>
        </div>

        <div>
            <label for="mesFiltro">Mês</label>
            <select id="mesFiltro"></select>
        </div>
    </section>

    <section class="resumo-financeiro">

        <div class="resumo-card saldo-anterior">
            <span>Saldo anterior</span>
            <h2 id="saldoAnterior">R$ 0,00</h2>
        </div>
        <div class="resumo-card saldo">
            <span>Saldo</span>
            <h2 id="saldoTotal">R$ 0,00</h2>
        </div>

        <div class="resumo-card receita">
            <span>Receitas</span>
            <h2 id="totalReceitas">R$ 0,00</h2>
        </div>

        <div class="resumo-card despesa">
            <span>Despesas</span>
            <h2 id="totalDespesas">R$ 0,00</h2>
        </div>

        <div class="resumo-card investimento">
            <span>Investimentos</span>
            <h2 id="totalInvestimentos">R$ 0,00</h2>
        </div>

    </section>

    <section class="card">
      <h2>Novo lançamento</h2>

      <form id="formMovimentacao">
        <input type="text" id="descricao" placeholder="Descrição">

        <input type="number" id="valor" placeholder="Valor">

        <select id="tipo">
          <option value="receita">Receita</option>
          <option value="despesa">Despesa</option>
          <option value="investimento">Investimento</option>
        </select>

        <input type="date" id="data">

        <button type="submit">Adicionar</button>
      </form>
    </section>

    <section class="card">
      <h2>Lançamentos</h2>
      <ul id="listaMovimentacoes"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
